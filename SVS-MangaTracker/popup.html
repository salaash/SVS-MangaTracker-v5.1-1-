<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>S.V.S Manga Tracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo-area">
      <img src="icons/logo.png" class="logo-icon" alt="S.V.S logo" />
      <div class="logo-text">
        <span class="logo-svs">S.V.S</span>
        <span class="logo-sub">MANGA TRACKER</span>
      </div>
    </div>
    <div class="header-actions">
      <button id="gachaBtn" class="gacha-btn" title="Random Roll from On Hold">🎲</button>
      <button id="settingsBtn" class="settings-btn" title="Settings">⚙</button>
    </div>
  </header>

  <!-- SETTINGS PANEL -->
  <div id="settingsPanel" class="settings-panel hidden">
    <button id="exportBtn" class="setting-action">📤 Export List (.json)</button>
    <label class="setting-action import-label">
      📥 Import List
      <input type="file" id="importFile" accept=".json" />
    </label>
    <p class="setting-note">Export saves title, chapter, URL, and status. Covers re-fetch on import.</p>
  </div>

  <!-- INPUT AREA -->
  <div class="input-section">
    <div class="url-row">
      <input type="text" id="urlInput" placeholder="Paste manga chapter URL…" />
      <button id="currentTabBtn" class="tab-btn" title="Use active tab URL">⊕ Tab</button>
      <button id="parseBtn">Add</button>
    </div>
    <div id="preview" class="preview hidden">
      <div class="preview-fields">
        <div class="field-group">
          <label>Title</label>
          <input type="text" id="previewTitle" />
        </div>
        <div class="field-group field-group--short">
          <label>Chapter</label>
          <input type="text" id="previewChapter" />
        </div>
      </div>
      <div class="field-group preview-cover-row">
        <label>Cover URL <span class="label-opt">(optional override)</span></label>
        <input type="text" id="previewCoverUrl" placeholder="Paste direct image URL…" />
      </div>
      <div class="preview-actions">
        <button id="confirmBtn" class="btn-confirm">Confirm</button>
        <button id="cancelBtn" class="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stats-left">
      <span class="stats-label">📚 Active</span>
      <span id="totalCount" class="stats-count">0</span>
      <span class="stats-sep">·</span>
      <span class="stats-label">⚰️</span>
      <span id="graveyardCount" class="stats-count graveyard-count">0</span>
    </div>
    <div id="achievementBadges" class="achievement-badges"></div>
  </div>

  <!-- SEARCH -->
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="🔍  Search manga…" />
  </div>

  <!-- STATUS FILTERS -->
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="reading">Reading</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
    <button class="filter-btn" data-filter="on-hold">On Hold</button>
    <select id="sortSelect" class="sort-select" title="Sort order">
      <option value="custom">⠿ Custom</option>
      <option value="newest">🆕 Newest</option>
      <option value="oldest">📅 Oldest</option>
      <option value="recent">🕐 Recent</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
      <option value="chapter-hi">Ch ↓</option>
      <option value="chapter-lo">Ch ↑</option>
    </select>
    <button class="filter-btn filter-btn--graveyard" data-filter="dropped">🪦 Graveyard</button>
  </div>

  <!-- LIST -->
  <div id="mangaList" class="manga-list"></div>

  <!-- DELETE MODAL -->
  <div id="confirmModal" class="modal-overlay hidden">
    <div class="modal-box">
      <p class="modal-title">Remove from list?</p>
      <p id="modalMangaName" class="modal-manga-name"></p>
      <div class="modal-buttons">
        <button id="modalCancel" class="btn-cancel">Keep it</button>
        <button id="modalConfirm" class="btn-delete-confirm">Yes, remove</button>
      </div>
    </div>
  </div>

  <!-- IMPORT MODAL -->
  <div id="importModal" class="modal-overlay hidden">
    <div class="modal-box">
      <p class="modal-title">Import List</p>
      <p class="modal-manga-name" id="importInfo"></p>
      <div class="modal-buttons" style="flex-direction:column;gap:8px">
        <button id="importMerge" class="btn-confirm">Merge (keep existing)</button>
        <button id="importReplace" class="btn-delete-confirm">Replace all</button>
        <button id="importCancel" class="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- GACHA MODAL -->
  <div id="gachaModal" class="modal-overlay hidden">
    <div class="modal-box gacha-box">
      <div class="gacha-header">🎲 RANDOM ROLL</div>
      <div class="gacha-subtitle" id="gachaSubtitle">Spinning from On Hold…</div>
      <div id="gachaDisplay" class="gacha-display">—</div>
      <div id="gachaResult" class="gacha-result hidden">
        <div class="gacha-winner-label">You're reading next:</div>
        <div id="gachaWinnerTitle" class="gacha-winner-title"></div>
        <div class="gacha-result-btns">
          <button id="gachaOpenBtn" class="btn-confirm">Open it! →</button>
          <button id="gachaCloseBtn" class="btn-cancel">Maybe later</button>
        </div>
      </div>
      <button id="gachaCloseTop" class="gacha-close-top">×</button>
    </div>
  </div>

  <!-- ACHIEVEMENT TOOLTIP -->
  <div id="achievementTooltip" class="achievement-tooltip hidden"></div>

  <script src="popup.js"></script>
</body>
</html>
